name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    name: Lint + Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: timesheet_hub
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/timesheet_hub
      JWT_SECRET: ci-test-secret-not-for-production
      TOKEN_ENCRYPT_KEY: ""
      ENVIRONMENT: ci
      E2E_TEST_MODE: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Lint (ruff check)
        working-directory: backend
        run: uv run ruff check .

      - name: Format check (ruff format)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Tests (pytest)
        working-directory: backend
        run: uv run pytest
