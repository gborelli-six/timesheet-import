server {
    listen 80;
    client_max_body_size 10M;

    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # In CI il frontend è l'immagine "runtime" (nginx statico) che ascolta su 3000,
    # non il dev server Vite (5173) usato in locale — vedi docker-compose.ci.yml.
    location / {
        proxy_pass       http://frontend:3000;
        proxy_set_header Host $host;
    }
}
